<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amaar Mining – Report Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8943A;
    --gold-light: #E8B860;
    --gold-dim: #8A6020;
    --dark: #0E0F0F;
    --dark2: #161818;
    --dark3: #1E2020;
    --dark4: #252828;
    --mid: #343838;
    --border: #2E3232;
    --text: #D8DCDC;
    --text-dim: #888E8E;
    --text-muted: #555C5C;
    --white: #F0F4F4;
    --danger: #C04040;
    --success: #3A8A5A;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── BUILDER UI ── */
  #builder {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* Header */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 22px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
    gap: 20px;
    flex-wrap: wrap;
  }
  .app-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--white);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .app-title span.accent { color: var(--gold); }
  .app-title-sub {
    font-family: 'Barlow', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Company info block */
  .company-block {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-top: 3px solid var(--gold);
    padding: 24px 28px;
    margin-bottom: 24px;
  }
  .company-block h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
  }
  .company-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }
  @media(max-width:600px){ .company-fields { grid-template-columns: 1fr; } }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 7px;
  }
  input[type="text"], input[type="date"], textarea, select {
    width: 100%;
    background: var(--dark3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s;
    resize: vertical;
  }
  input[type="text"]:focus, input[type="date"]:focus, textarea:focus, select:focus {
    border-color: var(--gold);
  }
  input[type="text"]::placeholder, textarea::placeholder { color: var(--text-muted); }

  /* Logo upload */
  .logo-upload-area {
    border: 2px dashed var(--mid);
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
  }
  .logo-upload-area:hover { border-color: var(--gold); background: rgba(200,148,58,.04); }
  .logo-upload-area input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .logo-upload-area img { max-height: 60px; max-width: 100%; object-fit: contain; }
  .logo-upload-label { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }
  .logo-upload-label span { color: var(--gold); font-weight: 600; }

  /* Section cards */
  .sections-container { display: flex; flex-direction: column; gap: 16px; }
  .section-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    position: relative;
    transition: border-color .2s;
  }
  .section-card:hover { border-color: var(--mid); }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: grab;
    user-select: none;
  }
  .section-header:active { cursor: grabbing; }
  .drag-handle {
    color: var(--text-muted);
    font-size: 16px;
    flex-shrink: 0;
  }
  .section-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    flex-shrink: 0;
    width: 28px;
  }
  .section-title-input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid transparent;
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 0;
    outline: none;
    transition: border-color .2s;
  }
  .section-title-input:focus { border-bottom-color: var(--gold); }
  .section-title-input::placeholder { color: var(--text-muted); font-weight: 400; }

  .btn-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 18px;
    line-height: 1;
    padding: 4px;
    transition: color .2s;
    flex-shrink: 0;
  }
  .btn-remove:hover { color: var(--danger); }

  .section-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

  /* Image upload inside section */
  .img-upload-area {
    border: 1px dashed var(--mid);
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .img-upload-area:hover { border-color: var(--gold-dim); background: rgba(200,148,58,.03); }
  .img-upload-area input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .img-upload-text { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
  .img-upload-text .icon { font-size: 16px; }
  .img-preview-strip { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .img-thumb-wrap { position: relative; }
  .img-thumb { width: 64px; height: 48px; object-fit: cover; border: 1px solid var(--border); display: block; }
  .btn-remove-img {
    position: absolute; top: -5px; right: -5px;
    background: var(--danger); color: white; border: none;
    width: 16px; height: 16px; border-radius: 50%; font-size: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }

  /* Add section */
  .btn-add-section {
    margin-top: 8px;
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px dashed var(--mid);
    color: var(--text-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-add-section:hover { border-color: var(--gold-dim); color: var(--gold); background: rgba(200,148,58,.04); }

  /* Action bar */
  .action-bar {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    flex-wrap: wrap;
    align-items: center;
  }
  .btn-primary {
    background: var(--gold);
    color: var(--dark);
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px 32px;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .btn-primary:hover { background: var(--gold-light); }
  .btn-primary:active { transform: scale(.98); }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 13px 22px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-ghost:hover { border-color: var(--text-dim); color: var(--white); }

  .divider { height: 1px; background: var(--border); margin: 4px 0; flex: 1; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--dark4); border: 1px solid var(--gold-dim);
    color: var(--gold-light); font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
    padding: 12px 24px; z-index: 9999;
    transition: transform .3s ease;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── REPORT PREVIEW OVERLAY ── */
  #report-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 1000;
    overflow-y: auto;
  }
  #report-overlay.show { display: block; }

  .report-toolbar {
    position: sticky;
    top: 0;
    background: var(--dark2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 10px;
    align-items: center;
    z-index: 10;
    flex-wrap: wrap;
  }
  .report-toolbar span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-right: auto;
  }

  /* ── REPORT DOCUMENT ── */
  #report-doc {
    max-width: 820px;
    margin: 32px auto;
    background: #fff;
    color: #1A1A1A;
    padding: 60px 70px;
    font-family: 'Barlow', sans-serif;
    line-height: 1.7;
  }

  .rep-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-bottom: 20px;
    border-bottom: 3px solid #C8943A;
    margin-bottom: 32px;
    gap: 20px;
  }
  .rep-logo-wrap img { max-height: 70px; max-width: 200px; object-fit: contain; }
  .rep-logo-placeholder {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #C8943A;
    text-transform: uppercase;
  }
  .rep-meta { text-align: right; }
  .rep-company-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #1A1A1A;
    text-transform: uppercase;
  }
  .rep-report-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 3px;
    color: #C8943A;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .rep-info-row {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    margin-bottom: 36px;
    padding-bottom: 20px;
    border-bottom: 1px solid #E8E8E8;
  }
  .rep-info-item label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #999;
    text-transform: uppercase;
    display: block;
    margin-bottom: 3px;
  }
  .rep-info-item span {
    font-size: 13px;
    font-weight: 500;
    color: #333;
  }

  .rep-section { margin-bottom: 40px; }
  .rep-section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1A1A1A;
    padding-bottom: 8px;
    border-bottom: 2px solid #C8943A;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .rep-section-num {
    font-size: 11px;
    font-weight: 700;
    color: #C8943A;
    letter-spacing: 2px;
    min-width: 28px;
  }
  .rep-section-body {
    font-size: 14px;
    color: #333;
    text-align: justify;
    white-space: pre-wrap;
    line-height: 1.8;
  }
  .rep-section-images {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 16px;
  }
  .rep-section-images img {
    max-width: 100%;
    max-height: 320px;
    object-fit: contain;
    border: 1px solid #E8E8E8;
    flex: 1 1 200px;
  }
  .rep-footer {
    border-top: 1px solid #E8E8E8;
    padding-top: 16px;
    margin-top: 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: #AAA;
    letter-spacing: 1px;
  }
  .rep-confidential {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #C8943A;
    opacity: .6;
  }

  @media print {
    #report-overlay { position: static; background: none; overflow: visible; }
    .report-toolbar { display: none !important; }
    #report-doc { margin: 0; box-shadow: none; padding: 40px; max-width: 100%; }
    body > #builder { display: none; }
  }
</style>
</head>
<body>

<!-- ══ BUILDER ══ -->
<div id="builder">
  <header class="app-header">
    <div>
      <div class="app-title">
        <span class="accent">▲</span>
        <div>
          <div>Amaar <span class="accent">Mining</span></div>
          <div class="app-title-sub">Report Generator</div>
        </div>
      </div>
    </div>
  </header>

  <!-- Company block -->
  <div class="company-block">
    <h2>Report Identity</h2>
    <div class="company-fields">
      <div>
        <label>Company / Project Name</label>
        <input type="text" id="field-company" placeholder="e.g. Amaar Mining Co." value="Amaar Mining">
      </div>
      <div>
        <label>Report Title</label>
        <input type="text" id="field-title" placeholder="e.g. Relinquishment Report 2024">
      </div>
      <div>
        <label>Prepared By</label>
        <input type="text" id="field-author" placeholder="Author name & role">
      </div>
      <div>
        <label>Report Date</label>
        <input type="date" id="field-date">
      </div>
      <div>
        <label>Reference / License No.</label>
        <input type="text" id="field-ref" placeholder="e.g. EL-2024-0087">
      </div>
      <div>
        <label>Company Logo (optional)</label>
        <div class="logo-upload-area" id="logo-drop">
          <input type="file" id="logo-input" accept="image/*">
          <div id="logo-preview-wrap">
            <div class="logo-upload-label">↑ <span>Upload logo</span> · any format</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Sections -->
  <div class="sections-container" id="sections-container"></div>
  <button class="btn-add-section" id="btn-add">+ Add Section</button>

  <!-- Actions -->
  <div class="action-bar">
    <button class="btn-primary" id="btn-generate">⊞ Create Report</button>
    <div class="divider"></div>
    <button class="btn-ghost" id="btn-reset">Clear All</button>
  </div>
</div>

<!-- ══ REPORT OVERLAY ══ -->
<div id="report-overlay">
  <div class="report-toolbar">
    <span>Report Preview</span>
    <button class="btn-ghost" id="btn-print">🖨 Print</button>
    <button class="btn-ghost" id="btn-pdf">⬇ Download PDF</button>
    <button class="btn-ghost" id="btn-pptx">⬇ Download PowerPoint</button>
    <button class="btn-primary" id="btn-close-report">✕ Close</button>
  </div>
  <div id="report-doc"></div>
</div>

<div id="toast">Report generated</div>

<!-- pptx lib -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PptxGenJS/3.12.0/pptxgen.bundled.js"></script>

<script>
// ── State ──
let sections = [];
let logoDataUrl = null;
let sectionIdCounter = 0;

// ── Init ──
document.getElementById('field-date').valueAsDate = new Date();
addSection('Executive Summary');
addSection('Regional Geology');
addSection('Exploration Results');

// ── Logo upload ──
document.getElementById('logo-input').addEventListener('change', function(){
  if(!this.files[0]) return;
  const fr = new FileReader();
  fr.onload = e => {
    logoDataUrl = e.target.result;
    const wrap = document.getElementById('logo-preview-wrap');
    wrap.innerHTML = `<img src="${logoDataUrl}" alt="logo">`;
  };
  fr.readAsDataURL(this.files[0]);
});

// ── Add section ──
document.getElementById('btn-add').addEventListener('click', () => addSection());

function addSection(defaultTitle='') {
  const id = ++sectionIdCounter;
  sections.push({ id, title: defaultTitle, content: '', images: [] });
  renderSections();
}

// ── Render sections ──
function renderSections(){
  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  sections.forEach((sec, idx) => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.dataset.id = sec.id;
    card.innerHTML = `
      <div class="section-header" draggable="true">
        <span class="drag-handle">⠿</span>
        <span class="section-num">${String(idx+1).padStart(2,'0')}</span>
        <input class="section-title-input" type="text" placeholder="Section Title (optional)" value="${escHtml(sec.title)}" data-field="title" data-id="${sec.id}">
        <button class="btn-remove" data-id="${sec.id}" title="Remove section">×</button>
      </div>
      <div class="section-body">
        <div>
          <label>Content</label>
          <textarea rows="5" placeholder="Write section content here… (leave blank to exclude)" data-field="content" data-id="${sec.id}">${escHtml(sec.content)}</textarea>
        </div>
        <div>
          <label>Images</label>
          <div class="img-upload-area">
            <input type="file" accept="image/*" multiple data-id="${sec.id}" class="img-file-input">
            <div class="img-upload-text"><span class="icon">🖼</span> Upload images · any size & format</div>
          </div>
          <div class="img-preview-strip" id="preview-${sec.id}"></div>
        </div>
      </div>
    `;
    container.appendChild(card);

    // Restore images preview
    const strip = document.getElementById(`preview-${sec.id}`);
    sec.images.forEach((img, iIdx) => addThumb(strip, img.url, sec.id, iIdx));
  });
  bindEvents();
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Bind events ──
function bindEvents(){
  // Title / content change
  document.querySelectorAll('[data-field]').forEach(el => {
    el.addEventListener('input', e => {
      const id = +e.target.dataset.id;
      const field = e.target.dataset.field;
      const sec = sections.find(s=>s.id===id);
      if(sec) sec[field] = e.target.value;
    });
  });

  // Remove section
  document.querySelectorAll('.btn-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      const id = +e.currentTarget.dataset.id;
      sections = sections.filter(s=>s.id!==id);
      renderSections();
    });
  });

  // Image upload
  document.querySelectorAll('.img-file-input').forEach(input => {
    input.addEventListener('change', function(){
      const id = +this.dataset.id;
      const sec = sections.find(s=>s.id===id);
      const strip = document.getElementById(`preview-${id}`);
      Array.from(this.files).forEach(file => {
        const fr = new FileReader();
        fr.onload = e2 => {
          const idx = sec.images.length;
          sec.images.push({ url: e2.target.result, name: file.name });
          addThumb(strip, e2.target.result, id, idx);
        };
        fr.readAsDataURL(file);
      });
      this.value = '';
    });
  });

  // Drag-and-drop reorder
  let dragSrcId = null;
  document.querySelectorAll('.section-card').forEach(card => {
    const header = card.querySelector('.section-header');
    header.addEventListener('dragstart', () => { dragSrcId = +card.dataset.id; card.style.opacity='.4'; });
    header.addEventListener('dragend', () => { card.style.opacity='1'; });
    card.addEventListener('dragover', e => { e.preventDefault(); card.style.borderColor='var(--gold)'; });
    card.addEventListener('dragleave', () => { card.style.borderColor=''; });
    card.addEventListener('drop', e => {
      e.preventDefault(); card.style.borderColor='';
      const targetId = +card.dataset.id;
      if(dragSrcId===targetId) return;
      const from = sections.findIndex(s=>s.id===dragSrcId);
      const to   = sections.findIndex(s=>s.id===targetId);
      const [item] = sections.splice(from,1);
      sections.splice(to,0,item);
      renderSections();
    });
  });
}

function addThumb(strip, url, secId, iIdx){
  const wrap = document.createElement('div');
  wrap.className = 'img-thumb-wrap';
  wrap.innerHTML = `
    <img class="img-thumb" src="${url}" alt="img">
    <button class="btn-remove-img" data-sid="${secId}" data-iidx="${iIdx}" title="Remove">×</button>
  `;
  wrap.querySelector('.btn-remove-img').addEventListener('click', e => {
    const sid = +e.target.dataset.sid;
    const sec = sections.find(s=>s.id===sid);
    sec.images.splice(iIdx,1);
    renderSections();
  });
  strip.appendChild(wrap);
}

// ── Generate Report ──
document.getElementById('btn-generate').addEventListener('click', () => {
  const company = document.getElementById('field-company').value.trim() || 'Amaar Mining';
  const title   = document.getElementById('field-title').value.trim() || 'Exploration Report';
  const author  = document.getElementById('field-author').value.trim();
  const date    = document.getElementById('field-date').value;
  const ref     = document.getElementById('field-ref').value.trim();

  // Filter sections with at least title, content, or images
  const filled = sections.filter(s => s.title.trim() || s.content.trim() || s.images.length>0);

  const dateStr = date ? new Date(date).toLocaleDateString('en-GB', {year:'numeric',month:'long',day:'numeric'}) : '';

  let metaRows = '';
  if(author) metaRows += `<div class="rep-info-item"><label>Prepared By</label><span>${escHtml(author)}</span></div>`;
  if(dateStr) metaRows += `<div class="rep-info-item"><label>Date</label><span>${dateStr}</span></div>`;
  if(ref) metaRows += `<div class="rep-info-item"><label>Reference</label><span>${escHtml(ref)}</span></div>`;
  if(filled.length) metaRows += `<div class="rep-info-item"><label>Sections</label><span>${filled.length}</span></div>`;

  let sectionsHtml = '';
  filled.forEach((sec, i) => {
    const secTitle = sec.title.trim() || `Section ${i+1}`;
    const imgsHtml = sec.images.length
      ? `<div class="rep-section-images">${sec.images.map(img=>`<img src="${img.url}" alt="">`).join('')}</div>`
      : '';
    const bodyHtml = sec.content.trim()
      ? `<div class="rep-section-body">${escHtml(sec.content)}</div>` : '';
    sectionsHtml += `
      <div class="rep-section">
        <div class="rep-section-title">
          <span class="rep-section-num">${String(i+1).padStart(2,'0')}</span>
          ${escHtml(secTitle)}
        </div>
        ${bodyHtml}
        ${imgsHtml}
      </div>`;
  });

  const logoHtml = logoDataUrl
    ? `<div class="rep-logo-wrap"><img src="${logoDataUrl}" alt="logo"></div>`
    : `<div class="rep-logo-placeholder">▲ ${escHtml(company)}</div>`;

  const html = `
    <div class="rep-header">
      ${logoHtml}
      <div class="rep-meta">
        <div class="rep-company-name">${escHtml(company)}</div>
        <div class="rep-report-title">${escHtml(title)}</div>
      </div>
    </div>
    ${metaRows ? `<div class="rep-info-row">${metaRows}</div>` : ''}
    ${sectionsHtml}
    <div class="rep-footer">
      <div class="rep-confidential">Confidential · ${escHtml(company)}</div>
      <div>${dateStr || ''}</div>
    </div>
  `;

  document.getElementById('report-doc').innerHTML = html;
  document.getElementById('report-overlay').classList.add('show');
  showToast('Report generated');
});

// ── Close report ──
document.getElementById('btn-close-report').addEventListener('click', () => {
  document.getElementById('report-overlay').classList.remove('show');
});

// ── Print ──
document.getElementById('btn-print').addEventListener('click', () => window.print());

// ── PDF (browser print dialog → Save as PDF) ──
document.getElementById('btn-pdf').addEventListener('click', () => {
  showToast('Opening print dialog – choose Save as PDF');
  setTimeout(() => window.print(), 300);
});

// ── PowerPoint ──
document.getElementById('btn-pptx').addEventListener('click', async () => {
  showToast('Building PowerPoint…');
  const company = document.getElementById('field-company').value.trim() || 'Amaar Mining';
  const title   = document.getElementById('field-title').value.trim() || 'Exploration Report';
  const author  = document.getElementById('field-author').value.trim();
  const date    = document.getElementById('field-date').value;
  const ref     = document.getElementById('field-ref').value.trim();
  const filled  = sections.filter(s => s.title.trim() || s.content.trim() || s.images.length>0);

  const pptx = new PptxGenJS();
  pptx.layout = 'LAYOUT_WIDE';
  pptx.author = author || company;
  pptx.title  = title;

  const GOLD = 'C8943A';
  const DARK = '0E0F0F';
  const WHITE = 'F0F4F4';
  const GREY = '888E8E';

  // ── Title slide ──
  const slide0 = pptx.addSlide();
  slide0.background = { color: DARK };
  // Gold bar
  slide0.addShape(pptx.ShapeType.rect, { x:0, y:4.8, w:13.33, h:.08, fill:{color:GOLD} });
  // Company
  slide0.addText(company.toUpperCase(), {
    x:.6, y:1.5, w:12, h:1,
    fontSize:40, bold:true, color:WHITE,
    fontFace:'Calibri', charSpacing:6
  });
  // Title
  slide0.addText(title, {
    x:.6, y:2.5, w:12, h:.8,
    fontSize:22, bold:false, color:GOLD,
    fontFace:'Calibri', charSpacing:4
  });
  // Meta
  let metaLines = [];
  if(author) metaLines.push(`Prepared by: ${author}`);
  const dateStr2 = date ? new Date(date).toLocaleDateString('en-GB', {year:'numeric',month:'long',day:'numeric'}) : '';
  if(dateStr2) metaLines.push(dateStr2);
  if(ref) metaLines.push(`Ref: ${ref}`);
  if(metaLines.length){
    slide0.addText(metaLines.join('   ·   '), {
      x:.6, y:4.2, w:12, h:.4,
      fontSize:11, color:GREY,
      fontFace:'Calibri', charSpacing:2
    });
  }

  // Logo on title slide
  if(logoDataUrl){
    try {
      slide0.addImage({ data: logoDataUrl, x:10.5, y:.4, w:2.2, h:1.0, sizing:{type:'contain',w:2.2,h:1.0} });
    } catch(e){}
  }

  // ── Content slides ──
  filled.forEach((sec, i) => {
    const secTitle = sec.title.trim() || `Section ${i+1}`;
    const hasImages = sec.images.length > 0;
    const hasContent = sec.content.trim().length > 0;

    const slide = pptx.addSlide();
    slide.background = { color: 'FFFFFF' };

    // Gold top bar
    slide.addShape(pptx.ShapeType.rect, { x:0, y:0, w:13.33, h:.08, fill:{color:GOLD} });
    // Left accent
    slide.addShape(pptx.ShapeType.rect, { x:0, y:.08, w:.04, h:7.42, fill:{color:GOLD} });

    // Section number
    slide.addText(String(i+1).padStart(2,'0'), {
      x:.15, y:.2, w:.8, h:.4,
      fontSize:10, bold:true, color:GOLD,
      fontFace:'Calibri', charSpacing:2
    });
    // Title
    slide.addText(secTitle.toUpperCase(), {
      x:.15, y:.55, w:12.8, h:.55,
      fontSize:22, bold:true, color:'1A1A1A',
      fontFace:'Calibri', charSpacing:2
    });
    // Gold divider under title
    slide.addShape(pptx.ShapeType.rect, { x:.15, y:1.12, w:12.9, h:.025, fill:{color:GOLD} });

    if(hasImages && hasContent){
      // Text left, images right
      slide.addText(sec.content.trim(), {
        x:.2, y:1.25, w:5.8, h:5.8,
        fontSize:11, color:'333333', fontFace:'Calibri',
        align:'justify', valign:'top', wrap:true
      });
      const imgs = sec.images.slice(0,4);
      const cols = imgs.length === 1 ? 1 : 2;
      const imgW = cols===1 ? 6.8 : 3.3;
      const imgH = imgs.length<=2 ? 5.5 : 2.6;
      imgs.forEach((img, j) => {
        const col = j % cols;
        const row = Math.floor(j / cols);
        const x = 6.3 + col*(imgW+.15);
        const y = 1.3 + row*(imgH+.12);
        try {
          slide.addImage({ data: img.url, x, y, w:imgW, h:imgH, sizing:{type:'contain',w:imgW,h:imgH} });
        } catch(e){}
      });
    } else if(hasContent && !hasImages){
      slide.addText(sec.content.trim(), {
        x:.2, y:1.25, w:12.8, h:5.8,
        fontSize:12, color:'333333', fontFace:'Calibri',
        align:'justify', valign:'top', wrap:true
      });
    } else if(hasImages && !hasContent){
      const imgs = sec.images.slice(0,6);
      const cols = Math.min(imgs.length, 3);
      const rows = Math.ceil(imgs.length / cols);
      const imgW = (12.8 - (cols-1)*0.15) / cols;
      const imgH = (5.6 - (rows-1)*0.12) / rows;
      imgs.forEach((img, j) => {
        const col = j % cols;
        const row = Math.floor(j / cols);
        try {
          slide.addImage({ data: img.url, x:.2+col*(imgW+.15), y:1.3+row*(imgH+.12), w:imgW, h:imgH, sizing:{type:'contain',w:imgW,h:imgH} });
        } catch(e){}
      });
    }

    // Footer
    slide.addShape(pptx.ShapeType.rect, { x:0, y:7.42, w:13.33, h:.08, fill:{color:GOLD} });
    slide.addText(`${company.toUpperCase()}  ·  ${title.toUpperCase()}`, {
      x:.2, y:7.24, w:10, h:.22,
      fontSize:8, color:'BBBBBB', fontFace:'Calibri', charSpacing:1
    });
    slide.addText(String(i+2), {
      x:12.8, y:7.24, w:.5, h:.22,
      fontSize:8, color:'BBBBBB', fontFace:'Calibri', align:'right'
    });
  });

  const safeTitle = title.replace(/[^a-z0-9_-]/gi,'_');
  await pptx.writeFile({ fileName: `${safeTitle}.pptx` });
  showToast('PowerPoint downloaded!');
});

// ── Reset ──
document.getElementById('btn-reset').addEventListener('click', () => {
  if(!confirm('Clear all sections and inputs?')) return;
  sections = [];
  logoDataUrl = null;
  document.getElementById('logo-preview-wrap').innerHTML = `<div class="logo-upload-label">↑ <span>Upload logo</span> · any format</div>`;
  ['field-company','field-title','field-author','field-ref'].forEach(id => document.getElementById(id).value='');
  document.getElementById('field-date').valueAsDate = new Date();
  addSection('Executive Summary');
  addSection('Regional Geology');
  addSection('Exploration Results');
});

// ── Toast ──
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}
</script>
